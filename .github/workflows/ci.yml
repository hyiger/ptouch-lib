name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # qrcode + python-barcode are pure Python (install everywhere). OpenCV
        # (the `codes` extra, for ArUco + the QR-decode tests) has wheels for
        # 3.12, so the full code suite runs there + on the macOS smoke job;
        # elsewhere those tests skip gracefully.
        include:
          - { os: ubuntu-latest, python-version: "3.10", extras: "dev,qr,barcode" }
          - { os: ubuntu-latest, python-version: "3.11", extras: "dev,qr,barcode" }
          - { os: ubuntu-latest, python-version: "3.12", extras: "dev,codes" }
          - { os: ubuntu-latest, python-version: "3.13", extras: "dev,qr,barcode" }
          - { os: macos-latest, python-version: "3.12", extras: "dev,codes" }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[${{ matrix.extras }}]"
      - name: Test
        run: python -m pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install ruff
      - run: ruff check .

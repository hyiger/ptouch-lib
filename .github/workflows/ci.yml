name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # qrcode + python-barcode are pure Python (install everywhere). OpenCV
        # (the `codes` extra, for ArUco + the QR-decode tests) ships wheels for
        # 3.12 and a cp37-abi3 wheel that also covers 3.13/3.14, so the full code
        # suite runs on those rows + the macOS job; elsewhere those tests skip.
        include:
          - { os: ubuntu-latest, python-version: "3.10", extras: "dev,qr,barcode" }
          - { os: ubuntu-latest, python-version: "3.11", extras: "dev,qr,barcode" }
          - { os: ubuntu-latest, python-version: "3.12", extras: "dev,codes" }
          - { os: ubuntu-latest, python-version: "3.13", extras: "dev,qr,barcode" }
          - { os: ubuntu-latest, python-version: "3.14", extras: "dev,codes" }
          - { os: macos-latest, python-version: "3.12", extras: "dev,codes" }
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[${{ matrix.extras }}]"
      - name: Test
        run: python -m pytest -q --cov=brother_ptouch --cov-report=term-missing

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: mypy
        run: mypy brother_ptouch

  build:
    name: build + smoke-test wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - name: Build sdist + wheel
        run: python -m build
      - name: Assert bundled data files are present in the wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          pngs = [n for n in names if n.startswith("brother_ptouch/nozzle_bands/") and n.endswith(".png")]
          assert len(pngs) == 13, f"expected 13 nozzle band PNGs, got {len(pngs)}: {pngs}"
          assert "brother_ptouch/_win_raw_print.ps1" in names, "missing _win_raw_print.ps1"
          print(f"OK: {len(pngs)} band PNGs + _win_raw_print.ps1 bundled")
          PY
      - name: Smoke-test the installed wheel (clean venv)
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install dist/*.whl
          /tmp/venv/bin/ptouch --version
          # exercises a bundled nozzle band PNG via importlib.resources
          /tmp/venv/bin/ptouch nozzle WC0.4 --out /tmp/smoke.bin
          test -s /tmp/smoke.bin
